name: user_app
description: RentRide User App - Book rides, track drivers, explore Sri Lanka.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../../packages/core
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  smooth_page_indicator: ^1.2.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
