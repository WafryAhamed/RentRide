name: RentRide CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - booking-service
          - location-service
          - vehicle-service
          - payment-service
          - notification-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend/${{ matrix.service }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - booking-service
          - location-service
          - vehicle-service
          - payment-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run Tests
        working-directory: backend/${{ matrix.service }}
        run: go test ./... -v -count=1
        env:
          APP_ENV: test
          JWT_ACCESS_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - booking-service
          - location-service
          - vehicle-service
          - payment-service
          - notification-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build Service
        working-directory: backend/${{ matrix.service }}
        run: go build -o bin/${{ matrix.service }} ./cmd/main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}
          path: backend/${{ matrix.service }}/bin/
