name: RentRide Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - booking-service
          - location-service
          - vehicle-service
          - payment-service
          - notification-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run Tests
        working-directory: backend/${{ matrix.service }}
        run: go test ./... -v
        env:
          APP_ENV: test
          JWT_ACCESS_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      - name: Build Binary
        working-directory: backend/${{ matrix.service }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/${{ matrix.service }} ./cmd/main.go

      - name: Build Docker Image
        working-directory: backend/${{ matrix.service }}
        run: |
          # Dockerfile will be created per deployment target
          echo "Docker build would run here for ${{ matrix.service }}"
          # docker build -t rentride/${{ matrix.service }}:${{ github.sha }} .
          # docker push rentride/${{ matrix.service }}:${{ github.sha }}
